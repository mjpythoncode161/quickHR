{% include 'accounts/header.html' %} {% include 'accounts/topbar.html' %} {%
include 'accounts/sidebar.html' %}

<div class="content-wrapper sa-app-page list-page">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Edit User</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
            <li class="breadcrumb-item">
              <a href="{% url 'user_list' %}">User List</a>
            </li>
            <li class="breadcrumb-item active">Edit User</li>
          </ol>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-6">
          <div class="card card-primary">
            <div class="card-header">
              <h3 class="card-title">Edit User Details</h3>
            </div>
            <form action="" method="POST">
              {% csrf_token %}
              <div class="card-body">
                <div class="form-group">
                  <label for="full_name">Full Name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="full_name"
                    name="full_name"
                    value="{{ user.full_name }}"
                    placeholder="Enter full name"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="email">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    value="{{ user.email }}"
                    placeholder="Enter email"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="contact">Contact No.</label>
                  <input
                    type="text"
                    class="form-control"
                    id="contact"
                    name="contact"
                    value="{{ user.contact }}"
                    placeholder="Enter contact number"
                    pattern="[0-9]{10}"
                    maxlength="10"
                  />
                </div>
                <div class="form-group">
                  <label for="role_id">Role</label>
                  <select class="form-control" id="role_id" name="role_id">
                    {% for role in roles %}
                    <option value="{{ role.id }}" {% if user.type == role.legacy_type %}selected{% endif %}>
                      {{ role.name }}
                    </option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <div class="card-footer">
                <button type="submit" class="btn btn-primary">
                  Update User
                </button>
                <a href="{% url 'user_list' %}" class="btn btn-default"
                  >Cancel</a
                >
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
