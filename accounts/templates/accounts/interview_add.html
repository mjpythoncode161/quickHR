{% include 'accounts/header.html' %}{% include 'accounts/topbar.html' %}{% include 'accounts/sidebar.html' %}
<div class="content-wrapper sa-app-page list-page"><section class="content"><div class="container-fluid"><div class="card card-outline card-warning"><div class="card-body">
<h3 class="text-warning">Schedule Interview</h3>
<form method="POST">{% csrf_token %}
<div class="row">
  <div class="col-md-6 form-group"><label>Candidate *</label><select name="candidate_id" class="form-control" required><option value="">Select</option>{% for c in candidates %}<option value="{{ c.id }}" {% if preselected == c.id|stringformat:'s' %}selected{% endif %}>{{ c.full_name }} — {{ c.job.title|default:"General" }}</option>{% endfor %}</select></div>
  <div class="col-md-3 form-group"><label>Date *</label><input type="date" name="interview_date" class="form-control" required></div>
  <div class="col-md-3 form-group"><label>Time *</label><input type="time" name="interview_time" class="form-control" required></div>
</div>
<div class="row">
  <div class="col-md-3 form-group"><label>Type</label><select name="interview_type" class="form-control"><option>In-person</option><option>Phone</option><option>Video</option></select></div>
  <div class="col-md-4 form-group"><label>Interviewer</label><input type="text" name="interviewer" class="form-control"></div>
  <div class="col-md-5 form-group"><label>Location / Meeting Link</label><input type="text" name="location" class="form-control"></div>
</div>
<button type="submit" class="btn btn-warning">Schedule</button>
<a href="{% url 'interview_list' %}" class="btn btn-secondary ml-2">Cancel</a>
</form></div></div></div></section></div>
{% include 'accounts/footer.html' %}
