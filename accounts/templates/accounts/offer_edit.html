{% include 'accounts/header.html' %}{% include 'accounts/topbar.html' %}{% include 'accounts/sidebar.html' %}
<div class="content-wrapper sa-app-page list-page"><section class="content"><div class="container-fluid"><div class="card card-outline card-primary"><div class="card-body">
<h3 class="text-primary">Edit Offer — {{ offer.candidate.full_name }}</h3>
<form method="POST">{% csrf_token %}
<div class="row">
  <div class="col-md-6 form-group"><label>Job Title</label><input type="text" name="job_title" class="form-control" value="{{ offer.job_title }}" required></div>
  <div class="col-md-3 form-group"><label>Department</label><input type="text" name="department" class="form-control" value="{{ offer.department }}"></div>
  <div class="col-md-3 form-group"><label>Status</label><select name="status" class="form-control">{% for s in offer_statuses %}<option value="{{ s }}" {% if offer.status == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
</div>
<div class="row">
  <div class="col-md-4 form-group"><label>Salary</label><input type="text" name="offered_salary" class="form-control" value="{{ offer.offered_salary }}" required></div>
  <div class="col-md-4 form-group"><label>Joining Date</label><input type="date" name="joining_date" class="form-control" value="{{ offer.joining_date|date:'Y-m-d' }}" required></div>
  <div class="col-md-4 form-group"><label>Valid Until</label><input type="date" name="valid_until" class="form-control" value="{{ offer.valid_until|date:'Y-m-d' }}"></div>
</div>
<div class="form-group"><label>Letter Body</label><textarea name="letter_body" class="form-control" rows="14">{{ offer.letter_body }}</textarea></div>
<button type="submit" class="btn btn-primary">Update</button>
<a href="{% url 'offer_view' offer.id %}" class="btn btn-secondary ml-2">View Letter</a>
</form></div></div></div></section></div>
{% include 'accounts/footer.html' %}
