{% include 'accounts/header.html' %}{% include 'accounts/topbar.html' %}{% include 'accounts/sidebar.html' %}
<div class="content-wrapper sa-app-page list-page"><section class="content"><div class="container-fluid"><div class="card card-outline card-warning"><div class="card-body">
<h3 class="text-warning">Interview — {{ interview.candidate.full_name }}</h3>
<form method="POST">{% csrf_token %}
<div class="row">
  <div class="col-md-3 form-group"><label>Date</label><input type="date" name="interview_date" class="form-control" value="{{ interview.interview_date|date:'Y-m-d' }}" required></div>
  <div class="col-md-3 form-group"><label>Time</label><input type="time" name="interview_time" class="form-control" value="{{ interview.interview_time|time:'H:i' }}" required></div>
  <div class="col-md-3 form-group"><label>Type</label><select name="interview_type" class="form-control"><option {% if interview.interview_type == 'In-person' %}selected{% endif %}>In-person</option><option {% if interview.interview_type == 'Phone' %}selected{% endif %}>Phone</option><option {% if interview.interview_type == 'Video' %}selected{% endif %}>Video</option></select></div>
  <div class="col-md-3 form-group"><label>Status</label><select name="status" class="form-control">{% for s in interview_statuses %}<option value="{{ s }}" {% if interview.status == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
</div>
<div class="row">
  <div class="col-md-4 form-group"><label>Interviewer</label><input type="text" name="interviewer" class="form-control" value="{{ interview.interviewer }}"></div>
  <div class="col-md-5 form-group"><label>Location</label><input type="text" name="location" class="form-control" value="{{ interview.location }}"></div>
  <div class="col-md-3 form-group"><label>Rating (1-5)</label><input type="number" name="rating" class="form-control" min="1" max="5" value="{{ interview.rating|default:'' }}"></div>
</div>
<div class="form-group"><label>Feedback</label><textarea name="feedback" class="form-control" rows="4">{{ interview.feedback }}</textarea></div>
<button type="submit" class="btn btn-warning">Save</button>
<a href="{% url 'interview_list' %}" class="btn btn-secondary ml-2">Back</a>
</form></div></div></div></section></div>
{% include 'accounts/footer.html' %}
