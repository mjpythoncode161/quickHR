<div class="sa-dash-header mb-2">
  <div class="row mb-0">
    <div class="col-sm-6">
      <h1 class="mb-0">{% if page_icon %}<i class="{{ page_icon }} text-warning mr-2"></i>{% endif %}{{ page_title }}</h1>
      {% if page_subtitle %}<p class="text-muted mb-0 mt-1">{{ page_subtitle }}</p>{% endif %}
    </div>
    <div class="col-sm-6">
      <ol class="breadcrumb float-sm-right sa-breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
        <li class="breadcrumb-item active">{{ breadcrumb_active }}</li>
      </ol>
    </div>
  </div>
</div>
