services:
  - type: web
    name: quickhr
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn crm1.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: quickhr-db
          property: connectionString

databases:
  - name: quickhr-db
    plan: free
